<page [id]="id"
      [title]="title"
      [location]="location"
      [screenRef]="screen"
      [afterCommit]="afterCommit.bind(this)"
      [afterCancel]="afterCancel.bind(this)"
      [startInEditMode]="true">
</page>

<ng-template #screen>
  <new-group-screen [group]="group"
                    [userGroups]="userGroups">
  </new-group-screen>
</ng-template>
