<ng-template #template>
  <div class="lv-header lv-check-column">
    <input #checkBox
           *ngIf="editable" type="checkbox" class="lv-checkbox"
           [(ngModel)]="isChecked"
           (change)="onChange(); checkBox.classList.toggle('lv-checkbox--checked')">
  </div>
  <ng-container *ngFor="let name of names">
    <div class="lv-header">{{ name }}</div>
  </ng-container>
  <div class="lv-blank"></div>

  <ng-content></ng-content>
</ng-template>
